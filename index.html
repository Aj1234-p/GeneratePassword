   <!-- ============================================
           MY APPROACH

  <div class="password-container">
     <h1>Generate Password</h1>
     <p>Password Strength</p>
     <div class="password-strength">
       <input type="range" id="range-btn"   min="6" max="25" value="6">
       <p id="show-range"></p>
     </div>
     <div class="password">
       <div class="password-maker">
         <label for="uppercase">Include Uppercase</label>
         <input type="checkbox" id="uppercase" class="checkBox">
       </div>
       <div class="password-maker">
         <label for="lowercase">Include Lowercase</label>
         <input type="checkbox" id="lowercase" class="checkBox">
       </div>
       <div class="password-maker">
         <label for="numbers">Include Numbers</label>
         <input type="checkbox" id="numbers" class="checkBox">
       </div>
       <div class="password-maker">
         <label for="symbols">Include Symbols</label>
         <input type="checkbox" id="symbols" class="checkBox">
       </div>
     </div>
          <button id="generate-btn">Generate Password</button>
         <div id="res"></div>
           <div class="check-password-strength">
            <label for="indicator">Password Strength</label>
             <input type="range" min="25" max="100" id="indicator"> 
             <p id="show-strength"></p>
          </div>
      </div>
